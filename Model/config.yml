# =============================================================================
# config.yml — Configuração da ETAPA DE MODELAGEM (/Model)
# Projeto: Home Credit Default Risk (LABDATA / FIA)
# =============================================================================

project:
  target: TARGET            # Variável alvo
  random_state: 42

# --- Storage (MinIO) — Configuração para a classe get_storage --------------
storage:
  buckets:
    abt: abt
    models: models
    monitoring: monitoring

# --- Entrada (onde o script busca a ABT no MinIO) ---------------------------
# O script train.py usa abt_dir + abt_files
paths:
  model_dir: Model/artifacts
  abt_dir: Dados/abt

# --- Arquivo da ABT ---------------------------------------------------------
abt_files:
  abt: abt.parquet

# --- Split treino/validação/teste -------------------------------------------
# Modificar aqui as proporções das bases de validação e teste
split:
  test_size: 0.20
  val_size: 0.20

# --- Modelagem (Definição dos modelos para iteração no treino) -------------
models:
  XGBOOST:
    enabled: true
    class: XGBClassifier
    params:
      n_estimators: 1000
      learning_rate: 0.05
      max_depth: 5
      scale_pos_weight: auto   # Calculado dinamicamente em train.py
      early_stopping_rounds: 50
      
  RANDOM_FOREST:
    enabled: true
    class: RandomForestClassifier
    params:
      class_weight: balanced
      n_estimators: 200
      n_jobs: -1
  
  LOGISTIC_REGRESSION:
    enabled: true
    class: LogisticRegression
    use_scaler: true           # Pipeline com StandardScaler incluído no train.py
    params:
      class_weight: balanced
      max_iter: 1000

# --- Inferência (serviço de predição / Streamlit) ---------------------------
# Regras de negócio aplicadas ANTES do modelo e parâmetros de mapeamento do
# input do cliente para o espaço de features da ABT. Ficam aqui (e não
# chumbados no app) para poder alterar ao vivo sem tocar no código.
inference:
  regras_negocio:
    idade_minima: 18
    idade_maxima: 65
    max_credito_sobre_renda: 15   # crédito > 15x a renda anual => recusa direta
  # A ABT usa AMT_INCOME_TOTAL/AMT_ANNUITY na escala ANUAL (base Kaggle).
  # O formulário coleta valores MENSAIS, então convertemos na entrada.
  meses_por_ano: 12
  # Faixa cinzenta em torno do threshold: dentro dela a decisão não é
  # automática, vai para análise humana (ver MLOps/README.md).
  zona_cinzenta: 0.05

# --- Pós-Processamento e Avaliação -----------------------------------------
# O threshold é o corte para classificar como "1" (Inadimplente)
# O train.py ajusta isso para garantir o min_recall_target

evaluation:
  min_recall_target: 0.70
  primary_metric: roc_auc
  threshold_range:
      min: 0.10
      max: 0.35
  report_metrics:             # Métricas de auditoria do modelo
    - roc_auc
    - precision
    - recall
    - f1
    - ks
    - confusion_matrix
    - pr_curve

# --- Monitoramento em produção (Model/monitoring.py) ------------------------
# Lido pelo DAG `home-credit-monitoring`. Alterar os limiares aqui muda o
# comportamento do monitoramento sem tocar no código.
monitoring:
  relatorio: relatorio_monitoramento.csv
  psi_buckets: 10            # nº de faixas (quantis) usadas no cálculo do PSI
  psi_alerta: 0.20           # PSI > 0.2 = drift relevante (padrão de mercado)
  roc_auc_minimo: 0.70       # abaixo disso o modelo é considerado degradado
  features_monitoradas:      # variáveis críticas p/ o negócio (renda, crédito, dívida)
    - AMT_INCOME_TOTAL
    - AMT_CREDIT
    - AMT_ANNUITY
    - AGE
    - EMPLOYMENT_YEARS
    - CREDIT_INCOME_RATIO
    - ANNUITY_INCOME_RATIO
    - DTI_RATIO
    - TOTAL_DEBT
    - BUREAU_LOAN_COUNT
    - EXT_SOURCE_MEAN